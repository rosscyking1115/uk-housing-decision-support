# Fly.io config for the API. Deploy from the REPO ROOT (the Dockerfile copies
# api/ + data/decision.duckdb, so the build context must be the root):
#   fly apps create uk-housing-decision-support-api    # one-time, claim the name
#   fly deploy --config api/fly.toml                   # build + ship
# Scales to zero when idle.
app = "uk-housing-decision-support-api"
primary_region = "lhr"

[build]
  # Path is relative to THIS config file (api/), while the build context is the
  # working dir you run `fly deploy` from (the repo root) — so the Dockerfile's
  # `COPY api/ ... data/decision.duckdb` resolve against the root.
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
