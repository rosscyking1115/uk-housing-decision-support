version: 2

# dbt unit test on the scoring maths — the model's core logic, asserted against
# hand-derivable mock areas rather than only property-tested (bounds/coherence)
# on real data. The five mock areas are constructed so each is the k-th order
# statistic on EVERY continuous indicator, which makes the median-anchored
# winsorised min-max exactly predictable:
#   A1 = minimum on everything  → below the 2nd percentile → clipped → best score
#   A3 = the exact median       → 50 on every continuous component
#   A5 = maximum on everything  → above the 98th percentile → clipped → worst
# A2/A4 sit between the anchors; their values pin the interpolation itself
# (e.g. affordability A2: lo=0.108, md=0.30 → 100 − 50·(0.20−0.108)/(0.30−0.108)
# = 76.0). Weights use the project defaults (all 1.0).

unit_tests:
  - name: rpt_neighbourhood_score_scoring_maths
    description: >
      Deterministic check of the neighbourhood scoring: median-anchored
      winsorised min-max (median → 50, clipping at p2/p98), inversion for
      lower-is-better indicators, the absolute EPC and flood anchors, the
      walkable+station convenience blend, the weighted GEOMETRIC mean with its
      floor at 1 (an all-zero area scores 1.0, never 0 or an error), and the
      missing-component rule (a null indicator is dropped and lowers
      confidence, never scored as zero).
    model: rpt_neighbourhood_score
    given:
      - input: ref('rpt_area_profile_mvp')
        rows:
          # columns: the six indicators the scorer reads + identity passthrough.
          # A3's walkable_amenity_count is null → convenience must be dropped.
          - { area_id: 'A1', area_name: 'Best', local_authority_name: 'LA', region: 'London', affordability_ratio: 0.10, crime_rate_per_1000: 10.0, nearest_station_km: 0.5, walkable_amenity_count: 5, epc_median_rating: 'A', flood_postcode_pct: 0.0 }
          - { area_id: 'A2', area_name: 'Good', local_authority_name: 'LA', region: 'London', affordability_ratio: 0.20, crime_rate_per_1000: 20.0, nearest_station_km: 1.0, walkable_amenity_count: 4, epc_median_rating: 'B', flood_postcode_pct: 25.0 }
          - { area_id: 'A3', area_name: 'Median', local_authority_name: 'LA', region: 'London', affordability_ratio: 0.30, crime_rate_per_1000: 30.0, nearest_station_km: 1.5, walkable_amenity_count: null, epc_median_rating: 'D', flood_postcode_pct: 50.0 }
          - { area_id: 'A4', area_name: 'Poor', local_authority_name: 'LA', region: 'London', affordability_ratio: 0.40, crime_rate_per_1000: 40.0, nearest_station_km: 2.0, walkable_amenity_count: 1, epc_median_rating: 'E', flood_postcode_pct: 75.0 }
          - { area_id: 'A5', area_name: 'Worst', local_authority_name: 'LA', region: 'London', affordability_ratio: 0.60, crime_rate_per_1000: 60.0, nearest_station_km: 3.0, walkable_amenity_count: 0, epc_median_rating: 'G', flood_postcode_pct: 100.0 }
    expect:
      rows:
        # A1: clipped at p2 on every continuous indicator → 100s across the
        # board; overall = geometric mean of five 100s = 100.
        - { area_id: 'A1', affordability_score: 100.0, safety_score: 100.0, energy_score: 100.0, flood_score: 100.0, convenience_score: 100.0, overall_score: 100.0, overall_rank: 1, components_available: 5, confidence_level: 'high' }
        # A2: interpolation below the median, e.g. affordability
        # 100 − 50·(0.20−0.108)/(0.30−0.108) = 76.0; convenience =
        # (walkable 4/5 → 80 + station 76.0)/2 = 78.0; overall =
        # exp(mean(ln{76, 76, 83, 75, 78})) = 77.5.
        - { area_id: 'A2', affordability_score: 76.0, safety_score: 76.0, energy_score: 83.0, flood_score: 75.0, convenience_score: 78.0, overall_score: 77.5, overall_rank: 2, components_available: 5, confidence_level: 'high' }
        # A3: the exact median → 50 on every continuous component; EPC 'D' and
        # flood 50% are the absolute mid-anchors. walkable is null → convenience
        # dropped (NOT zeroed): 4 of 5 components, confidence falls to medium,
        # overall = geometric mean of four 50s = 50.
        - { area_id: 'A3', affordability_score: 50.0, safety_score: 50.0, energy_score: 50.0, flood_score: 50.0, convenience_score: null, overall_score: 50.0, overall_rank: 3, components_available: 4, confidence_level: 'medium' }
        # A4: interpolation above the median, e.g. affordability
        # 100 − (50 + 50·(0.40−0.30)/(0.584−0.30)) = 32.4; convenience =
        # (walkable 1/5 → 20 + station 32.4)/2 = 26.2.
        - { area_id: 'A4', affordability_score: 32.4, safety_score: 32.4, energy_score: 33.0, flood_score: 25.0, convenience_score: 26.2, overall_score: 29.6, overall_rank: 4, components_available: 5, confidence_level: 'high' }
        # A5: clipped at p98 → 0 everywhere. The geometric-mean FLOOR is the
        # point: ln(greatest(0,1)) = 0, so overall = exp(0) = 1.0 — an all-zero
        # area yields 1.0, not 0 and not a ln(0) error.
        - { area_id: 'A5', affordability_score: 0.0, safety_score: 0.0, energy_score: 0.0, flood_score: 0.0, convenience_score: 0.0, overall_score: 1.0, overall_rank: 5, components_available: 5, confidence_level: 'high' }
