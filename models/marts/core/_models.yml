version: 2

models:

  - name: dim_area
    description: |
      Canonical housing decision-support area dimension. MVP grain is MSOA,
      built from the postcode lookup (the committed fixture by default, or the
      full national ONSPD snapshot with `--vars 'geo_source: onspd'`).
      Restricted to England & Wales MSOAs (Scottish Intermediate Zones and ONS
      pseudo-codes excluded); raw ONS codes are resolved to readable area /
      local-authority / region names via the committed name seeds.
      Grain: one row per area_id.
    config:
      materialized: table
    columns:
      - name: area_id
        description: Stable MSOA key.
        tests:
          - not_null
          - unique
      - name: area_name
        description: Human-readable area name.
        tests:
          - not_null
      - name: area_type
        description: Area grain for the decision-support mart.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['MSOA']
      - name: local_authority_code
        description: Local authority code from the postcode lookup.
        tests:
          - not_null
      - name: local_authority_name
        description: Local authority name from the postcode lookup.
        tests:
          - not_null
      - name: region
        description: Region context, or Unknown for fixture fallback rows.
        tests:
          - not_null
      - name: centroid_latitude
        description: Average latitude of matched postcodes in the area.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: centroid_longitude
        description: Average longitude of matched postcodes in the area.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: source_snapshot_date
        description: Date of the postcode lookup snapshot.
        tests:
          - not_null
      - name: source_name
        description: Source name for the lookup.
        tests:
          - not_null
      - name: source_url
        description: Source URL for the lookup.
        tests:
          - not_null

  - name: dim_postcode_geography
    description: |
      Postcode-to-area geography bridge for the housing decision-support
      product direction. Grain: one row per postcode in the lookup snapshot.
    config:
      materialized: table
    columns:
      - name: postcode
        description: Normalised full postcode.
        tests:
          - not_null
          - unique
      - name: postcode_outward
        description: Outward postcode.
        tests:
          - not_null
      - name: postcode_area
        description: Leading postcode area.
        tests:
          - not_null
      - name: area_id
        description: >
          MSOA area key. Null for postcodes outside England & Wales (no MSOA)
          or retired postcodes; the relationship test ignores null keys.
        tests:
          - relationships:
              arguments:
                to: ref('dim_area')
                field: area_id
      - name: lsoa_code
        description: LSOA code where supplied by the lookup. Null outside England & Wales.
      - name: local_authority_code
        description: Local authority code. Null for postcodes with no allocated area.
      - name: region
        description: Region context. Coalesced to 'Unknown' when the lookup is blank.
        tests:
          - not_null
      - name: latitude
        description: Postcode centroid latitude. Null when the lookup has no grid reference.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -90
                max_value: 90
      - name: longitude
        description: Postcode centroid longitude. Null when the lookup has no grid reference.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -180
                max_value: 180
      - name: is_current_postcode
        description: True when the lookup marks the postcode as current.
        tests:
          - not_null
      - name: is_in_source_lookup
        description: True when the postcode is present in the source lookup.
        tests:
          - not_null
      - name: source_snapshot_date
        description: Date of the postcode lookup snapshot.
        tests:
          - not_null

  - name: dim_date
    description: |
      Generated calendar for the configured analysis window plus one buffer
      year on either side
      ({{ var('landreg_start_year') - 1 }}-01-01 → {{ var('landreg_end_year') + 1 }}-12-31)
      via dbt_date.get_date_dimension.
      One row per calendar day, with ~30 derived columns (day-of-week, month, quarter, ISO week, fiscal year, etc).
      Grain: one row per calendar day.
    config:
      materialized: table
    columns:
      - name: date_day
        description: Calendar date (PK).
        tests:
          - not_null
          - unique

  - name: dim_postcode
    description: |
      One row per distinct postcode that appears in fct_transactions, with three levels of geographic rollup (outward → area → region).
      Grain: one row per postcode.
    config:
      materialized: table
    columns:
      - name: postcode_key
        description: Surrogate key — sha256(postcode).
        tests:
          - not_null
          - unique
      - name: postcode
        description: Full postcode at time of sale (e.g. 'SW1A 1AA').
        tests:
          - not_null
          - unique
      - name: postcode_outward
        description: Outward code (e.g. 'SW1A').
      - name: postcode_area
        description: Postcode area, leading 1-2 letters (e.g. 'SW').
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: '^[A-Z]{1,2}$'
      - name: region
        description: ONS region or 'Unknown'.
        tests:
          - not_null

  - name: dim_property_type
    description: |
      Lookup decoding Land Registry's 5 property-type codes. Hand-built inline.
      Grain: one row per property-type code.
    config:
      materialized: table
    columns:
      - name: property_type_code
        description: Single-character code (D/S/T/F/O).
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['D', 'S', 'T', 'F', 'O']
                quote: true
      - name: property_type_label
        description: Human-readable label (Detached / Semi-detached / Terraced / Flat / Other).
        tests:
          - not_null

  - name: dim_tenure
    description: |
      Lookup decoding Land Registry's 3 tenure codes.
      Grain: one row per tenure code.
    config:
      materialized: table
    columns:
      - name: tenure_code
        description: Single-character code (F/L/U).
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['F', 'L', 'U']
                quote: true
      - name: tenure_label
        description: Human-readable label (Freehold / Leasehold / Unknown).
        tests:
          - not_null

  - name: fct_transactions
    description: |
      Headline fact: one row per arm's-length residential property sale
      recorded by HM Land Registry in England + Wales for the configured
      analysis window ({{ var('landreg_start_year') }}–{{ var('landreg_end_year') }}).
      Excludes ppd_category='additional' (corrections, repossessions, etc).
      Grain: one row per Land Registry transaction.
    config:
      materialized: table
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 500000
            max_value: 10000000
    columns:
      - name: transaction_key
        description: Surrogate key — sha256(transaction_id). Stable across schema changes.
        tests:
          - not_null
          - unique
      - name: transaction_id
        description: Natural key from Land Registry (UUID-like).
        tests:
          - not_null
          - unique
      - name: date_key
        description: FK to dim_date (the calendar date of transfer).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: postcode_key
        description: FK to dim_postcode. May be NULL for the rare records with no postcode.
        tests:
          - relationships:
              arguments:
                to: ref('dim_postcode')
                field: postcode_key
      - name: property_type_code
        description: FK to dim_property_type.
        tests:
          - relationships:
              arguments:
                to: ref('dim_property_type')
                field: property_type_code
      - name: tenure_code
        description: FK to dim_tenure.
        tests:
          - relationships:
              arguments:
                to: ref('dim_tenure')
                field: tenure_code
      - name: price_gbp
        description: Sale price in GBP.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                # Guards that the staging garbage cap held: stg_landreg filters
                # price to 1..250M (drops recording errors like a £540M terraced
                # house). Keep this max in sync with that cap.
                min_value: 1
                max_value: 250000000
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: 0.5
                min_value: 50000
                max_value: 2000000
      - name: is_new_build
        description: TRUE if newly built, FALSE if existing.
        tests:
          - not_null
      - name: transferred_on
        description: Date of property transfer (denormalised from date_key for ad-hoc queries).
        tests:
          - not_null
      - name: transferred_year
        description: Year of transfer, integer.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "{{ var('landreg_start_year') }}"
                max_value: "{{ var('landreg_end_year') }}"
      - name: transferred_month
        description: Month of transfer (1-12), integer.
      - name: region
        description: ONS region (denormalised from postcode_key).
        tests:
          - not_null
          # All 10 ONS regions of England + Wales must be PRESENT in the
          # data. _to_contain_set ensures the 10 are all there but allows
          # 'Unknown' (and any future extras) without false-positives.
          # _to_equal:10 was wrong — the data has 11 distinct values
          # (10 + 'Unknown' for postcodes that don't match the seed).
          - dbt_expectations.expect_column_distinct_values_to_contain_set:
              arguments:
                value_set:
                  - London
                  - North East
                  - North West
                  - Yorkshire and the Humber
                  - East Midlands
                  - West Midlands
                  - East of England
                  - South East
                  - South West
                  - Wales
      - name: postcode
        description: Full postcode at sale (denormalised).
        tests:
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              arguments:
                min_value: 5
                max_value: 8
                row_condition: "postcode is not null"
      - name: postcode_area
        description: Postcode area (denormalised).
      - name: town_city
        description: Town or city (denormalised from raw).
      - name: district
        description: Local authority district (denormalised from raw).
      - name: _loaded_at
        description: UTC load timestamp (lineage).
        tests:
          - not_null

seeds:
  - name: ref_onspd_sample
    description: |
      Tiny ONS Postcode Directory-shaped fixture used to prove the
      decision-support geography contract without committing a large official
      lookup snapshot. Replace or supplement with full official ONSPD ingestion
      when implementing the production geography layer.
    columns:
      - name: postcode
        description: Normalised full postcode.
        tests:
          - not_null
          - unique
      - name: area_id
        description: MSOA-like area key.
        tests:
          - not_null
      - name: latitude
        description: Postcode centroid latitude.
        tests:
          - not_null
      - name: longitude
        description: Postcode centroid longitude.
        tests:
          - not_null

  - name: ref_postcode_area_region
    description: |
      Hand-curated mapping from postcode area (1-2 leading letters) to one
      of the 10 ONS regions of England + Wales. ~104 areas covered.
      Outer-London postcode areas (BR / CR / DA / EN / HA / IG / KT / RM / SM / TW / UB)
      classified as 'London' for analytical clarity.
    columns:
      - name: postcode_area
        description: Postcode area, 1-2 letters.
        tests:
          - not_null
          - unique
      - name: region
        description: ONS region or 'Wales'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - London
                  - North East
                  - North West
                  - Yorkshire and the Humber
                  - East Midlands
                  - West Midlands
                  - East of England
                  - South East
                  - South West
                  - Wales
