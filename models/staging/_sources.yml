version: 2

sources:
  - name: landreg
    description: |
      HM Land Registry Price Paid Data — every recorded property transaction
      in England & Wales since 1995. Public dataset, monthly refresh.
      Loaded by scripts/download_raw.py + scripts/load_to_duckdb.py.

      Source page: https://www.gov.uk/government/statistical-data-sets/price-paid-data-downloads
      Data dictionary: https://www.gov.uk/guidance/about-the-price-paid-data
    schema: raw_landreg
    loader: scripts/load_to_duckdb.py
    loaded_at_field: cast(_loaded_at as timestamp)
    freshness:
      warn_after: { count: 35, period: day }
      error_after: { count: 90, period: day }
    tables:
      - name: transactions
        description: |
          One row per recorded property sale. Untransformed — staging in
          Phase 2 is responsible for casting, renaming, and light cleanup.
        columns:
          - name: transaction_id
            description: Unique transaction reference issued by Land Registry (UUID-like).
            tests:
              - not_null
          - name: price
            description: Sale price in GBP, stored as text in the source CSV.
            tests:
              - not_null
          - name: date_of_transfer
            description: Date the property was transferred (YYYY-MM-DD HH:MM:SS in source).
            tests:
              - not_null
          - name: postcode
            description: Postcode at time of sale; may be empty for very old records.
          - name: property_type
            description: |
              Single-character code:
                D = detached
                S = semi-detached
                T = terraced
                F = flat / maisonette
                O = other
              Note: F means 'flat' here, NOT 'freehold' — see kit lesson L16.
              'freehold' is encoded in the `duration` column.
          - name: old_new
            description: Y if newly built, N if existing.
          - name: duration
            description: |
              F = freehold, L = leasehold. Some old records use U = unknown.
          - name: paon
            description: Primary Addressable Object Name (e.g. house number).
          - name: saon
            description: Secondary Addressable Object Name (e.g. flat number).
          - name: street
            description: Street name.
          - name: locality
            description: Locality (often empty).
          - name: town_city
            description: Town or city.
          - name: district
            description: Local authority district.
          - name: county
            description: County.
          - name: ppd_category_type
            description: |
              A = standard transactions (arm's-length sale at full market value)
              B = additional (corrections, transfers under power of sale, etc.)
          - name: record_status
            description: |
              A = added, C = changed, D = deleted. The Land Registry publishes
              a full snapshot each month; later records supersede earlier ones
              with the same transaction_id.
          - name: _loaded_at
            description: UTC ISO-8601 timestamp injected by load_to_duckdb.py.
            tests:
              - not_null

  - name: geo
    description: |
      Normalized national ONS Postcode Directory (ONSPD) snapshot —
      postcode → MSOA / LSOA / local-authority / region plus centroid
      coordinates. Loaded by scripts/load_geography.py from a local snapshot
      prepared with scripts/prepare_onspd_seed.py. Only present (and only read)
      when building with `--vars 'geo_source: onspd'`; the committed
      ref_onspd_sample seed is the CI fixture for the default fixture build.

      Source page: https://geoportal.statistics.gov.uk/
      Licence: Open Government Licence v3.0 (contains OS, ONS, Royal Mail and
      NRS data © Crown copyright and database right).
    schema: raw_geo
    loader: scripts/load_geography.py
    tables:
      - name: onspd_postcodes
        description: |
          One row per postcode in the prepared ONSPD snapshot, already shaped
          to the geography contract (same columns as ref_onspd_sample).

  - name: epc
    description: |
      Domestic Energy Performance Certificates for England & Wales. Loaded by
      scripts/load_epc.py from a local bulk snapshot prepared with
      scripts/prepare_epc_seed.py. Only present (and only read) when building
      with `--vars 'epc_source: bulk'`; the committed ref_epc_sample seed is the
      CI fixture for the default build.

      Source: https://get-energy-performance-data.communities.gov.uk/
      Licence: Open Government Licence v3.0. Certificates may be expired or
      superseded; bulk download requires a free GOV.UK One Login.
    schema: raw_epc
    loader: scripts/load_epc.py
    tables:
      - name: certificates
        description: |
          One row per certificate, shaped to the energy contract (same columns
          as ref_epc_sample): postcode, current_energy_rating,
          current_energy_efficiency, property_type, lodgement_date.

  - name: police
    description: |
      Street-level crime for England & Wales (data.police.uk), keyed by 2021
      LSOA. Loaded by scripts/load_crime.py from a local bulk archive prepared
      with scripts/prepare_crime_seed.py. Only present (and only read) when
      building with `--vars 'crime_source: bulk'`; the committed ref_crime_sample
      seed is the CI fixture for the default build.

      Source: https://data.police.uk/data/  (Open Government Licence v3.0)
      Indicators only — never labelled "safe"/"unsafe".
    schema: raw_police
    loader: scripts/load_crime.py
    tables:
      - name: street_crime
        description: |
          One row per recorded crime, shaped to the crime contract (same columns
          as ref_crime_sample): lsoa_code, crime_type, month.

  - name: constraints
    description: |
      Per-MSOA planning-constraint counts and a flood-risk flag, pre-computed by
      spatial point-in-polygon (postcode centroids inside planning.data.gov.uk
      constraint and flood-risk-zone geometries) in
      scripts/prepare_area_constraints.py and loaded by scripts/load_constraints.py.
      Only present (and only read) when building with
      `--vars 'constraints_source: computed'`; the committed
      ref_area_constraints_sample seed is the CI fixture.

      Source: https://www.planning.data.gov.uk/ (Open Government Licence v3.0)
    schema: raw_constraints
    loader: scripts/load_constraints.py
    tables:
      - name: area_constraints
        description: |
          One row per MSOA (same columns as ref_area_constraints_sample):
          area_id, planning_constraint_count, flood_risk_flag, flood_postcode_pct.

  - name: amenities
    description: |
      Per-MSOA amenity/convenience access (nearest-amenity distances and a
      walkable-essentials count), pre-computed from an OpenStreetMap extract by
      spatial nearest-neighbour in scripts/prepare_amenity_access.py and loaded
      by scripts/load_amenities.py. Only present (and only read) when building
      with `--vars 'amenities_source: computed'`; the committed
      ref_amenity_access_sample seed is the CI fixture.

      Source: OpenStreetMap via a Geofabrik extract (Open Database Licence).
    schema: raw_amenities
    loader: scripts/load_amenities.py
    tables:
      - name: area_access
        description: |
          One row per MSOA (same columns as ref_amenity_access_sample):
          area_id, nearest_station_km, nearest_supermarket_km, nearest_gp_km,
          nearest_school_km, nearest_greenspace_km, walkable_amenity_count.
