version: 2

# Separate downstream leaves make the deployed website, API, and shipped extract
# independently visible in dbt lineage and selectable by exposure name.
exposures:

  - name: housing_decision_support_api
    label: "England & Wales Housing Decision Support API"
    type: application
    maturity: high
    url: https://uk-housing-decision-support-api.fly.dev/docs
    description: |
      The public FastAPI interface serves area scores and their source facts from
      the committed read-only DuckDB extract.
    owner: &product_owner
      name: Cheng-Yuan King
      email: rosscyking1115@gmail.com
    depends_on:
      - ref('rpt_neighbourhood_score')
      - ref('rpt_area_profile_mvp')

  - name: housing_decision_support_website
    label: "England & Wales Housing Decision Support website"
    type: application
    maturity: high
    url: https://uk-housing-decision-support.vercel.app/
    description: |
      The public Next.js website consumes the API and presents each indicator
      beside the underlying fact and evidence caveats.
    owner: *product_owner
    depends_on:
      - ref('rpt_neighbourhood_score')
      - ref('rpt_area_profile_mvp')

  - name: housing_decision_support_extract
    label: "Decision DuckDB extract"
    type: application
    maturity: high
    url: https://github.com/rosscyking1115/uk-housing-decision-support/blob/main/data/decision.duckdb
    description: |
      The slim read-only DuckDB delivery artifact assembled from both decision
      marts by scripts/build_decision_db.py and consumed by the API.
    owner: *product_owner
    depends_on:
      - ref('rpt_neighbourhood_score')
      - ref('rpt_area_profile_mvp')
