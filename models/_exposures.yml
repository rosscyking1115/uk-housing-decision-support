version: 2

# Exposures declare downstream consumers of the warehouse. dbt renders them as
# leaf nodes in the lineage graph, so the dbt-docs site shows the live MoveIn
# product as a real downstream node instead of the decision marts dangling with
# no consumers. They also surface in `dbt list --resource-type exposure` and
# `dbt run --select +exposure:movein_product`.

exposures:

  - name: movein_product
    label: "MoveIn API + website"
    type: application
    maturity: high
    url: https://uk-housing-decision-support.vercel.app/
    description: |
      The MoveIn API (FastAPI, `api/`) and website (Next.js, `web/`) serve the
      decision marts to the public. The API ships a slim read-only DuckDB extract
      built by `scripts/build_decision_db.py` from the marts below — the upstream
      source of truth for every area score and fact.

    owner:
      name: Ross King
      email: leaffeng1115@gmail.com

    depends_on:
      - ref('rpt_neighbourhood_score')   # → area scores + "why this area"
      - ref('rpt_area_profile_mvp')      # → the raw per-area facts
